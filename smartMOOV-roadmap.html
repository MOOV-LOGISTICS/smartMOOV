<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>smartMOOV · Product Roadmap 2026 – Q1 2027</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orient:#004F7C;
  --orient80:#337296;
  --orient60:#6695AF;
  --orient25:#CCE1E9;
  --orange:#FE5000;
  --orange80:#FE7F40;
  --orange60:#FEA080;
  --orange25:#FED8C0;
  --mystic:#E6EBF0;
  --mystic80:#E9EDF3;
  --mystic60:#EDF0F6;
  --mystic25:#F8FAFC;
  --black:#000;
  --white:#FFF;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;background:var(--mystic);color:var(--black);min-width:1260px}

/* HEADER */
.header{background:var(--orient);padding:32px 48px 28px;color:var(--white)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between}
.logo-img{height:36px;display:block}
.lang-toggle{display:flex;gap:0;border:1.5px solid rgba(255,255,255,0.35);border-radius:6px;overflow:hidden;flex-shrink:0;margin-top:4px}
.lang-btn{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.55);letter-spacing:0.05em;transition:all 0.2s}
.lang-btn.active{background:var(--orange);color:var(--white)}
.header-title{font-size:26px;font-weight:700;margin-top:14px;color:var(--white)}
.header-sub{color:var(--orient25);font-size:13px;margin-top:5px}
.stats-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;align-items:flex-start}
.stat-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 18px;min-width:120px}
.stat-num{font-size:22px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;color:var(--orient25);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}
.s-done .stat-num{color:#6EE7B7}
.s-cur .stat-num{color:var(--orange60)}
.s-plan .stat-num{color:var(--orient25)}
.s-all .stat-num{color:var(--white)}
.header-note{margin-left:auto;font-size:12px;color:var(--orient25);line-height:1.7;border-left:2px solid var(--orange);padding-left:14px;max-width:360px}
.header-note strong{color:var(--white)}

/* CONTENT */
.content{padding:24px 48px 48px}

/* ROADMAP */
.roadmap{background:var(--white);border-radius:14px;box-shadow:0 2px 16px rgba(0,79,124,0.10),0 0 0 1px #d0dce6;overflow:visible}
.g{display:grid;grid-template-columns:196px 108px repeat(11,1fr)}

/* PHASE HEADER */
.phase-row{border-bottom:1px solid var(--mystic);overflow:hidden;border-radius:14px 14px 0 0}
.ph{padding:9px 8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;text-align:center;border-right:1px solid rgba(0,0,0,0.06)}
.ph-lbl{background:var(--mystic25);color:var(--orient80);text-align:left;padding-left:16px}
.ph-done{background:var(--orient25);color:var(--orient);grid-column:2}
.ph-cur{background:var(--orange25);color:var(--orange);grid-column:3/span 2}
.ph-h2{background:var(--orient25);color:var(--orient);grid-column:5/span 6}
.ph-q1{background:var(--orange25);color:var(--orange);grid-column:11/span 3}

/* MONTH HEADER */
.month-row{border-bottom:2px solid var(--mystic);background:var(--mystic25)}
.mh-lbl{display:flex;align-items:center;padding-left:16px;font-size:11px;font-weight:600;color:var(--orient80);border-right:1px solid var(--mystic);background:var(--mystic60)}
.mh{padding:7px 3px;text-align:center;font-size:11px;font-weight:600;color:var(--orient80);border-right:1px solid var(--mystic);line-height:1.3}
.mh.dc{background:var(--orient25);color:var(--orient)}
.mh.cc{background:var(--orange25);color:var(--orange)}
.mh.hc{background:var(--orient25);color:var(--orient)}
.mh.qc{background:var(--orange25);color:var(--orange80)}
.today-mh{position:relative}
.today-mh::after{content:'▼ NOW';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--orange);font-weight:800;white-space:nowrap;background:var(--orange25);padding:0 4px;letter-spacing:0.06em}

/* DOMAIN ROWS */
.drow{border-bottom:1px solid var(--mystic);min-height:62px;align-items:stretch}
.drow:last-child{border-bottom:none}
.drow:nth-child(odd){background:var(--mystic25)}
.drow:nth-child(even){background:var(--white)}
.dl{padding:10px 10px 10px 16px;border-right:2px solid var(--orient25);display:flex;flex-direction:column;justify-content:center;background:var(--mystic60)}
.dl-icon{font-size:15px;margin-bottom:2px}
.dl-name{font-size:12.5px;font-weight:700;color:var(--orient);line-height:1.3}
.dl-sub{font-size:10px;color:var(--orient60);margin-top:1px}

/* CELLS */
.cell{display:flex;align-items:center;padding:5px 4px;border-right:1px solid var(--mystic)}
.cell.dc{background:rgba(204,225,233,0.3)}
.cell.cc{background:rgba(254,216,192,0.3)}
.cell.hc{background:rgba(204,225,233,0.2)}
.cell.qc{background:rgba(254,216,192,0.25)}

/* BLOCKS */
.blk{flex:1;border-radius:7px;padding:7px 10px;font-size:11.5px;font-weight:600;cursor:default;position:relative;transition:transform 0.15s,box-shadow 0.15s;overflow:visible;line-height:1.3;color:var(--white)}
.blk:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:50}
.blk-done{background:linear-gradient(135deg,var(--orient),var(--orient80))}
.blk-cur{background:linear-gradient(135deg,var(--orange),var(--orange80));box-shadow:0 0 0 2px rgba(254,80,0,0.2);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(254,80,0,0.15)}50%{box-shadow:0 0 0 5px rgba(254,80,0,0.08),0 2px 8px rgba(254,80,0,0.2)}}
.blk-near{background:linear-gradient(135deg,var(--orient80),var(--orient60))}
.blk-mid{background:linear-gradient(135deg,var(--orient),var(--orient80))}
.blk-late{background:linear-gradient(135deg,var(--orient),var(--orient60))}
.blk-q1{background:linear-gradient(135deg,var(--orange),var(--orange60))}
.blk-done-full{background:linear-gradient(135deg,var(--orient),var(--orient80));color:var(--white);flex:1;display:flex;align-items:center;gap:8px;border-radius:7px;padding:7px 12px;font-size:11.5px;font-weight:600;position:relative;overflow:visible;cursor:default}
.blk-done-full:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:50}
.complete-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,0.75);background:rgba(0,0,0,0.18);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}

/* TOOLTIP */
.tip{display:none;position:absolute;top:calc(100% + 8px);left:0;z-index:200;background:var(--orient);color:var(--mystic25);border-radius:10px;padding:14px 16px;min-width:240px;max-width:300px;box-shadow:0 8px 28px rgba(0,79,124,0.35);font-size:12px;line-height:1.5;pointer-events:none;border:1px solid var(--orient80)}
.tip-r{left:auto;right:0}
.blk:hover .tip,.blk-done-full:hover .tip{display:block}
.tip-title{font-weight:700;font-size:12.5px;color:var(--white);border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:7px;margin-bottom:8px}
.tip ul{list-style:none}
.tip ul li{display:flex;gap:6px;margin-bottom:4px;color:var(--orient25);font-size:11.5px}
.tip ul li::before{content:'·';color:var(--orange60);font-size:18px;line-height:1;flex-shrink:0}

/* LEGEND */
.legend{display:flex;align-items:center;gap:16px;margin-top:16px;flex-wrap:wrap;padding:14px 18px;background:var(--white);border-radius:10px;border:1px solid var(--orient25);font-size:12px;color:var(--orient)}
.li{display:flex;align-items:center;gap:7px}
.ld{width:26px;height:10px;border-radius:3px}
.ld-done{background:linear-gradient(90deg,var(--orient),var(--orient80))}
.ld-cur{background:linear-gradient(90deg,var(--orange),var(--orange80))}
.ld-near{background:linear-gradient(90deg,var(--orient80),var(--orient60))}
.ld-q1{background:linear-gradient(90deg,var(--orange),var(--orange60))}
.lsep{width:1px;height:16px;background:var(--orient25)}

.footer{text-align:center;padding:18px;font-size:11px;color:var(--orient60);border-top:1px solid var(--mystic);margin-top:24px}
</style>
</head>

function setLang(l) {
  CUR_LANG = l;
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  // Update simple text
  document.querySelectorAll('[data-k]').forEach(function(el){
    var k = el.getAttribute('data-k');
    if(STR[l][k] !== undefined) el.innerHTML = STR[l][k];
  });
  // Update block labels
  document.querySelectorAll('[data-bid] .blk-lbl').forEach(function(el){
    var bid = el.closest('[data-bid]').getAttribute('data-bid');
    var k = bid.replace(/[- ]/g,'')+'l';
    if(k in STR[l]) el.textContent = STR[l][k];
  });
  // Update tooltip feature lists
  document.querySelectorAll('ul[data-bid]').forEach(function(ul){
    var bid = ul.getAttribute('data-bid');
    if(TIPS[bid] && TIPS[bid][l]) {
      ul.innerHTML = TIPS[bid][l].map(function(t){return '<li>'+t+'</li>'}).join('');
    }
  });
}

// Init
setLang('zh');
